<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DR CELL - Servicio Técnico de Móviles</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    /* Barra superior */
    .navbar {
      width: 100%;
      background: #000;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }

    .logo {
      height: 70px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: #00aaff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Banner decorativo SUPER pequeño */
    .banner {
      width: 100%;
      height: 80px;        /* ALTURA MUY PEQUEÑA */
      object-fit: cover;   /* Recorta bonito */
      display: block;
    }

    /* Sección principal */
    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 32px;
      color: #00aaff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #000;
    }

    .hero p {
      font-size: 18px;
      color: #fff;
      text-shadow: 0 0 10px #000;
    }

    /* Sección de información */
    .info {
      padding: 20px;
      text-align: center;
      background: #0a0a0a;
      margin-top: 20px;
      border-top: 1px solid #222;
    }

    .info h2 {
      color: #00aaff;
      margin-bottom: 10px;
    }

    .info p {
      margin: 5px 0;
      color: #ccc;
    }

    footer {
      background: #111;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Barra superior -->
  <nav class="navbar">
    <img src="img/logo-dr-cell.png" alt="DR CELL" class="logo">
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <!-- Banner decorativo pequeño -->
  <img src="banner-dr-cell.jpg" alt="Banner DR CELL" class="banner">

  <!-- Sección principal -->
  <section class="hero">
    <h1>Bienvenido a DR CELL</h1>
    <p>Servicio Técnico de Móviles en La Habana</p>
  </section>

  <!-- Sección de información -->
  <section class="info">
    <h2>Información</h2>
    <p><strong>Horario:</strong> Lunes a Sábado, 9:00 AM - 6:00 PM</p>
    <p><strong>Dirección:</strong> Marianao, Calle 43 / 118 y 120</p>
    <p><strong>Teléfono:</strong> +53 5 000 0000</p>
  </section>

  <!-- Pie de página -->
  <footer>
    © 2026 DR CELL - Todos los derechos reservados
  </footer>

</body>
</html>
