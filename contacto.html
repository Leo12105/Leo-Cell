<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - DR CELL</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0f24, #1a1f3c, #2a1f5c);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
            color: #fff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR SOLO LOGO */
        .navbar {
            width: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #4a4fff;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a6cff;
            box-shadow: 0 0 12px #4a6cff;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #6a8cff, #8aa0ff, #b0c4ff);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #4a6cff;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        h1 {
            margin-top: 40px;
            font-size: 2rem;
            color: #8aa0ff;
            text-shadow: 0 0 12px #4a6cff;
        }

        p {
            font-size: 1.2rem;
            color: #d0d4ff;
        }

        .info-box {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        /* MENÚ INFERIOR */
        .menu-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            border-top: 2px solid #4a4fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 999;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8aa0ff;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .menu-item:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #4a6cff;
        }

        .menu-item svg {
            width: 26px;
            height: 26px;
            stroke: #8aa0ff;
            fill: none;
            stroke-width: 2;
            margin-bottom: 3px;
            transition: 0.3s;
        }

        .menu-item:hover svg {
            stroke: #ffffff;
            filter: drop-shadow(0 0 6px #4a6cff);
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-top: 2px solid #4a4fff;
            margin-bottom: 60px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR SOLO LOGO -->
    <nav class="navbar">
        <div class="logo-container">
            <img src="img/logo-dr-cell.png" alt="DR CELL" class="logo">

    </nav>

    <h1>Contacto</h1>

        <p><strong>WhatsApp:</strong>

            <span>Contacto</span>
        </a>
    </div>

    <footer>
        © 2026 DR CELL - Todos los derechos reservados
    </footer>

</body>
</html>
