<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Contacto - DR CELL</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0f24, #1a1f3c, #2a1f5c);

            animation: fondoAnimado 12s ease infinite;
            color: #fff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

            0% { background-position: 0% 50%; }

            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-top: 40px;
            font-size: 2rem;
            color: #8aa0ff;
            text-shadow: 0 0 12px #4a6cff;
        }

        p {
            font-size: 1.2rem;
            color: #d0d4ff;
        }

        .info-box {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-top: 2px solid #4a4fff;
        }
    </style>
</head>
