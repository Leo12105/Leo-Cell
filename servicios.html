<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios - DR CELL</title>

    <style>
        /* ELIMINA SCROLL HORIZONTAL */
        html, body {
            overflow-x: hidden !important;
            width: 100% !important;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;

            /* FONDO DEGRADADO ESTILO QvaCloud */
            background: linear-gradient(135deg, #0a0f24, #1a1f3c, #2a1f5c);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
            color: #fff;
        }

        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CABECERA */
        .navbar {
            width: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #4a4fff;
            box-sizing: border-box;
        }

        /* CONTENEDOR DEL LOGO + TEXTO */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* LOGO CIRCULAR */
        .logo {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a6cff;
            box-shadow: 0 0 12px #4a6cff;
        }

        /* TEXTO DR CELL — ESTILO 1 FUTURISTA */
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #6a8cff, #8aa0ff, #b0c4ff);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #4a6cff;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #8aa0ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #4a6cff;
        }

        /* TÍTULO PRINCIPAL */
        .titulo {
            text-align: center;
            margin-top: 40px;
            font-size: 2.2rem;
            color: #8aa0ff;
            text-shadow: 0 0 12px #4a6cff;
        }

        /* CONTENEDOR DE SERVICIOS */
        .servicios-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        /* TARJETAS */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px #4a6cff;
        }

        .card h3 {
            font-size: 1.4rem;
            color: #8aa0ff;
            text-shadow: 0 0 10px #4a6cff;
            margin-bottom: 10px;
        }

        .card p {
            color: #d0d4ff;
            font-size: 1rem;
        }

        /* BOTÓN */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #4a6cff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 12px #4a6cff;
            transition: 0.3s;
        }

        .btn:hover {
            background: #6a8cff;
            box-shadow: 0 0 18px #6a8cff;
        }

        /* FOOTER */
        footer {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 15px;
            border-top: 2px solid #4a4fff;
            color: #d0d4ff;
            margin-top: 40px;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .logo { height: 50px; width: 50px; }
            .logo-text { font-size: 1.3rem; letter-spacing: 1px; }
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 0.85rem; }
            .titulo { font-size: 1.8rem; }
        }
    </style>
</head>
